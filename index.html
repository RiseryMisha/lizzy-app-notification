<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кнопка Внимания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#09090b">
</head>
<body class="bg-zinc-950 text-white h-screen flex flex-col justify-between items-center p-6 select-none">
    <div class="w-full text-center pt-10">
        <h1 class="text-2xl font-bold tracking-wide">Сигнал Внимания</h1>
        <p class="text-zinc-400 text-sm mt-1">Одно нажатие, чтобы напомнить о себе</p>
    </div>

    <div class="flex flex-col items-center justify-center my-auto w-full">
        <button id="attnBtn" class="relative group w-56 h-56 rounded-full bg-gradient-to-tr from-rose-600 to-pink-500 shadow-2xl shadow-rose-600/50 flex flex-col items-center justify-center active:scale-95 transition-all duration-200 cursor-pointer border-4 border-rose-400/30">
            <span class="text-6xl animate-bounce">❤️</span>
            <span class="mt-3 font-semibold text-lg tracking-wider">ЖДУ ТЕБЯ</span>
            <div class="absolute inset-0 rounded-full border-2 border-white/20 animate-ping pointer-events-none"></div>
        </button>
        <div id="status" class="mt-8 text-sm font-medium h-6 text-emerald-400 opacity-0 transition-opacity duration-300">
            ✅ Сигнал успешно отправлен!
        </div>
    </div>

    <div class="text-xs text-zinc-600 pb-4">
        Сделано с любовью ❤️
    </div>

    <script>
        const btn = document.getElementById('attnBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.classList.add('opacity-80', 'scale-95');

            try {
                // Путь к серверной функции Netlify
                const res = await fetch('/.netlify/functions/send', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    status.textContent = '✅ Сигнал доставлен!';
                    status.classList.remove('opacity-0', 'text-rose-400');
                    status.classList.add('text-emerald-400');
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } else {
                    throw new Error(data.error || 'Ошибка');
                }
            } catch (e) {
                status.textContent = '❌ Не удалось отправить';
                status.classList.remove('opacity-0', 'text-emerald-400');
                status.classList.add('text-rose-400');
            }

            setTimeout(() => {
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'scale-95');
                status.classList.add('opacity-0');
            }, 2000);
        });
    </script>
</body>
</html>
